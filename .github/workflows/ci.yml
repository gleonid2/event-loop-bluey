name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies --out event-loop-bluey.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-loop-bluey-vsix
          path: event-loop-bluey.vsix
          if-no-files-found: error
