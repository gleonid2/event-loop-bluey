<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head (boxy/rounded) -->
  <rect x="5" y="4" width="11" height="10" rx="2" ry="2"/>
  <!-- Left ear (pointy, upright) -->
  <polygon points="6,4 4,0 9,4" fill="currentColor"/>
  <!-- Right ear (pointy, upright) -->
  <polygon points="12,4 17,0 15,4" fill="currentColor"/>
  <!-- Left eye (big round) -->
  <circle cx="8.5" cy="8.5" r="1.8"/>
  <circle cx="9" cy="8.2" r="0.8" fill="currentColor" stroke="none"/>
  <!-- Right eye -->
  <circle cx="13" cy="8.5" r="1.5"/>
  <circle cx="13.3" cy="8.2" r="0.7" fill="currentColor" stroke="none"/>
  <!-- Nose -->
  <ellipse cx="10.5" cy="11.5" rx="1.2" ry="0.8" fill="currentColor" stroke="none"/>
  <!-- Mouth/smile -->
  <path d="M9 12.5 Q10.5 14 12 12.5"/>
  <!-- Body (boxy) -->
  <rect x="6.5" y="14" width="8" height="6" rx="1.5" ry="1.5"/>
  <!-- Belly patch -->
  <ellipse cx="10.5" cy="17" rx="2.5" ry="2"/>
  <!-- Left leg -->
  <line x1="8" y1="20" x2="8" y2="23"/>
  <line x1="7" y1="23" x2="9" y2="23"/>
  <!-- Right leg -->
  <line x1="13" y1="20" x2="13" y2="23"/>
  <line x1="12" y1="23" x2="14" y2="23"/>
  <!-- Waving paw -->
  <path d="M14.5 15 Q17 13 19 11"/>
  <circle cx="19.5" cy="10.5" r="1.3"/>
  <!-- Tail -->
  <path d="M6.5 18 Q3 17 2 19.5" stroke-width="1.5"/>
</svg>
